name: Scheduled Model Training and Telegram Report

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  train-and-report:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: ./forex
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('forex/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f forex/requirements.txt ]; then python -m pip install -r forex/requirements.txt; fi

      - name: Create output directories
        run: |
          mkdir -p logs reports models

      - name: Train the model
        env:
          API_KEY: ${{ secrets.MEXC_API_KEY }}
          API_SECRET: ${{ secrets.MEXC_API_SECRET }}
          FALLBACK_KEY: ${{ secrets.API_KEY }}
          FALLBACK_SECRET: ${{ secrets.API_SECRET }}
        run: |
          KEY="${API_KEY:-${FALLBACK_KEY}}"
          SECRET="${API_SECRET:-${FALLBACK_SECRET}}"
          python forex/src/scripts/train.py \
            --timeframe 15m \
            --training-pairs 80 \
            --lookback-bars 500 \
            --model-path models/signal_model.pkl \
            --feature-importance reports/feature_importance.csv \
            --metrics-file reports/training_metrics.json \
            --log-file logs/training.log \
            --api-key "$KEY" \
            --api-secret "$SECRET"

      - name: Send training report to admin DM
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_USER_ID" ]; then
            echo "Skipping Telegram report: credentials not configured"
            exit 0
          fi
          python forex/src/scripts/notify_telegram.py \
            --telegram-token "$TELEGRAM_TOKEN" \
            --telegram-user-id "$TELEGRAM_USER_ID" \
            --metrics-file reports/training_metrics.json \
            --backtest-report reports/backtest_report.json || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-report-${{ github.run_id }}
          path: |
            logs/**
            reports/**
            models/**
          retention-days: 30
