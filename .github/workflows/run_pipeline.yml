name: Run AXION_ML Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/forex/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f forex/requirements.txt ]; then python -m pip install -r forex/requirements.txt; fi

      - name: Run unit tests
        run: |
          python -m pip install pytest
          pytest -q forex/tests || true

      - name: Optionally download market data (requires secrets)
        if: ${{ secrets.MEXC_API_KEY != '' || secrets.API_KEY != '' }}
        env:
          API_KEY: ${{ secrets.MEXC_API_KEY || secrets.API_KEY }}
          API_SECRET: ${{ secrets.MEXC_API_SECRET || secrets.API_SECRET }}
        run: |
          python forex/src/scripts/download_data.py --api-key "$API_KEY" --api-secret "$API_SECRET" --timeframe 15m --lookback-bars 600 --training-pairs 80

      - name: Train model
        env:
          API_KEY: ${{ secrets.MEXC_API_KEY || secrets.API_KEY }}
          API_SECRET: ${{ secrets.MEXC_API_SECRET || secrets.API_SECRET }}
        run: |
          python forex/src/scripts/train.py --timeframe 15m --training-pairs 80 --lookback-bars 600 --api-key "$API_KEY" --api-secret "$API_SECRET" || true

      - name: Run backtest
        env:
          API_KEY: ${{ secrets.MEXC_API_KEY || secrets.API_KEY }}
          API_SECRET: ${{ secrets.MEXC_API_SECRET || secrets.API_SECRET }}
        run: |
          python forex/src/scripts/backtest.py --timeframe 15m --training-pairs 80 --lookback-bars 600 --api-key "$API_KEY" --api-secret "$API_SECRET" || true
