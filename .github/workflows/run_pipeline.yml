name: Run AXION_ML Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: ./forex
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/forex/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f forex/requirements.txt ]; then python -m pip install -r forex/requirements.txt; fi

      - name: Run unit tests
        run: |
          python -m pip install pytest
          pytest -q forex/tests || true

      - name: Run signal scan
        env:
          API_KEY: ${{ secrets.MEXC_API_KEY }}
          API_SECRET: ${{ secrets.MEXC_API_SECRET }}
          FALLBACK_KEY: ${{ secrets.API_KEY }}
          FALLBACK_SECRET: ${{ secrets.API_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          KEY="${API_KEY:-${FALLBACK_KEY}}"
          SECRET="${API_SECRET:-${FALLBACK_SECRET}}"
          python forex/src/scripts/signal_bot.py \
            --timeframe 15m \
            --scan-limit 80 \
            --lookback-bars 500 \
            --log-file logs/signal_scan.log \
            --api-key "$KEY" \
            --api-secret "$SECRET" \
            --telegram-token "$TELEGRAM_TOKEN" \
            --telegram-channel-id "$TELEGRAM_CHANNEL_ID" \
            --telegram-user-id "$TELEGRAM_USER_ID" || true
